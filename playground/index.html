<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>khmer-segment · Playground</title>
        <script>
            (function () {
                try {
                    var k = 'khmer-segment-theme';
                    var s = localStorage.getItem(k);
                    var d =
                        s === 'dark' ||
                        (s !== 'light' &&
                            window.matchMedia('(prefers-color-scheme: dark)')
                                .matches);
                    document.documentElement.classList.toggle('dark', d);
                } catch (e) {
                    /* ignore */
                }
            })();
        </script>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
            rel="stylesheet"
        />
    </head>
    <body
        class="min-h-screen bg-canvas font-sans text-[15px] leading-normal text-neutral-800 antialiased dark:text-neutral-200"
    >
        <header
            class="sticky top-0 z-[100] flex flex-wrap items-center justify-between gap-x-4 gap-y-2 border-b border-border bg-surface px-4 py-2.5"
        >
            <div class="flex flex-wrap items-center gap-3">
                <div class="flex items-center gap-3">
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 512 512"
                    class="block h-9 w-9 shrink-0"
                    width="36"
                    height="36"
                    aria-hidden="true"
                    focusable="false"
                >
                    <defs>
                        <linearGradient
                            id="ks-nav-bg"
                            x1="256"
                            y1="0"
                            x2="256"
                            y2="512"
                            gradientUnits="userSpaceOnUse"
                        >
                            <stop stop-color="#1e3a8a" />
                            <stop offset="1" stop-color="#0f172a" />
                        </linearGradient>
                        <linearGradient
                            id="ks-nav-shine"
                            x1="256"
                            y1="0"
                            x2="256"
                            y2="180"
                            gradientUnits="userSpaceOnUse"
                        >
                            <stop stop-color="#ffffff" stop-opacity="0.14" />
                            <stop offset="1" stop-color="#ffffff" stop-opacity="0" />
                        </linearGradient>
                    </defs>
                    <rect
                        width="512"
                        height="512"
                        rx="108"
                        ry="108"
                        fill="url(#ks-nav-bg)"
                    />
                    <rect
                        width="512"
                        height="512"
                        rx="108"
                        ry="108"
                        fill="url(#ks-nav-shine)"
                    />
                    <g fill="#e8c547">
                        <rect x="100" y="156" width="84" height="200" rx="18" ry="18" />
                        <rect x="214" y="176" width="84" height="160" rx="18" ry="18" />
                        <rect x="328" y="156" width="84" height="200" rx="18" ry="18" />
                    </g>
                    <text
                        x="412"
                        y="468"
                        text-anchor="end"
                        fill="#e8c547"
                        font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
                        font-size="42"
                        font-weight="600"
                        letter-spacing="-0.02em"
                    >
                        JS
                    </text>
                </svg>
                <h1
                    class="flex min-w-0 flex-col gap-0.5 leading-none"
                >
                    <span
                        class="font-mono text-[15px] font-semibold tracking-tight text-neutral-900 dark:text-neutral-100"
                        >khmer-segment</span
                    >
                    <span
                        class="text-[11px] font-medium uppercase tracking-[0.12em] text-neutral-500 dark:text-neutral-400"
                        >Playground</span
                    >
                </h1>
                </div>
                <button
                    type="button"
                    id="theme-toggle"
                    class="inline-flex items-center gap-1.5 rounded-lg border border-border bg-canvas px-2.5 py-1.5 text-xs font-medium text-neutral-600 outline-none transition-colors hover:bg-neutral-100 dark:text-neutral-300 dark:hover:bg-neutral-800"
                    aria-label="Toggle dark mode"
                    aria-pressed="false"
                >
                    <span class="theme-icon-light inline dark:hidden" aria-hidden="true"
                        >🌙</span
                    >
                    <span class="theme-icon-dark hidden dark:inline" aria-hidden="true"
                        >☀️</span
                    >
                    <span class="theme-label-light inline dark:hidden">Dark</span>
                    <span class="theme-label-dark hidden dark:inline">Light</span>
                </button>
            </div>
            <div class="flex flex-wrap items-center gap-3.5">
                <div class="flex items-center gap-2">
                    <span
                        class="text-[13px] font-medium text-neutral-500 dark:text-neutral-400"
                        >Strategy</span
                    >
                    <div class="strategy-btns flex gap-1">
                        <button
                            type="button"
                            data-strategy="fmm"
                            data-active="true"
                            class="rounded-lg px-3 py-1.5 text-xs font-medium outline-none transition-colors data-[active=true]:bg-neutral-900 data-[active=true]:text-white dark:data-[active=true]:bg-neutral-100 dark:data-[active=true]:text-neutral-900 data-[active=false]:bg-neutral-100 data-[active=false]:text-neutral-700 data-[active=false]:hover:bg-neutral-200/80 dark:data-[active=false]:bg-neutral-800 dark:data-[active=false]:text-neutral-300 dark:data-[active=false]:hover:bg-neutral-700/80 focus-visible:ring-2 focus-visible:ring-accent/35 focus-visible:ring-offset-2 dark:focus-visible:ring-offset-zinc-950"
                        >
                            FMM
                        </button>
                        <button
                            type="button"
                            data-strategy="bmm"
                            data-active="false"
                            class="rounded-lg px-3 py-1.5 text-xs font-medium outline-none transition-colors data-[active=true]:bg-neutral-900 data-[active=true]:text-white dark:data-[active=true]:bg-neutral-100 dark:data-[active=true]:text-neutral-900 data-[active=false]:bg-neutral-100 data-[active=false]:text-neutral-700 data-[active=false]:hover:bg-neutral-200/80 dark:data-[active=false]:bg-neutral-800 dark:data-[active=false]:text-neutral-300 dark:data-[active=false]:hover:bg-neutral-700/80 focus-visible:ring-2 focus-visible:ring-accent/35 focus-visible:ring-offset-2 dark:focus-visible:ring-offset-zinc-950"
                        >
                            BMM
                        </button>
                        <button
                            type="button"
                            data-strategy="bimm"
                            data-active="false"
                            class="rounded-lg px-3 py-1.5 text-xs font-medium outline-none transition-colors data-[active=true]:bg-neutral-900 data-[active=true]:text-white dark:data-[active=true]:bg-neutral-100 dark:data-[active=true]:text-neutral-900 data-[active=false]:bg-neutral-100 data-[active=false]:text-neutral-700 data-[active=false]:hover:bg-neutral-200/80 dark:data-[active=false]:bg-neutral-800 dark:data-[active=false]:text-neutral-300 dark:data-[active=false]:hover:bg-neutral-700/80 focus-visible:ring-2 focus-visible:ring-accent/35 focus-visible:ring-offset-2 dark:focus-visible:ring-offset-zinc-950"
                        >
                            BiMM
                        </button>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <span
                        class="text-[13px] font-medium text-neutral-500 dark:text-neutral-400"
                        >Normalize</span
                    >
                    <div
                        class="normalize-btns inline-flex overflow-hidden rounded-lg border border-border bg-surface p-px dark:bg-neutral-800"
                    >
                        <button
                            type="button"
                            data-norm="on"
                            data-active="true"
                            class="px-3 py-1.5 text-xs font-medium outline-none transition-colors data-[active=true]:bg-neutral-900 data-[active=true]:text-white dark:data-[active=true]:bg-neutral-100 dark:data-[active=true]:text-neutral-900 data-[active=false]:bg-surface data-[active=false]:text-neutral-600 data-[active=false]:hover:bg-neutral-50 dark:data-[active=false]:bg-neutral-800 dark:data-[active=false]:text-neutral-300 dark:data-[active=false]:hover:bg-neutral-700/50 focus-visible:ring-2 focus-visible:ring-inset focus-visible:ring-accent/35"
                        >
                            On
                        </button>
                        <button
                            type="button"
                            data-norm="off"
                            data-active="false"
                            class="px-3 py-1.5 text-xs font-medium outline-none transition-colors data-[active=true]:bg-neutral-900 data-[active=true]:text-white dark:data-[active=true]:bg-neutral-100 dark:data-[active=true]:text-neutral-900 data-[active=false]:bg-surface data-[active=false]:text-neutral-600 data-[active=false]:hover:bg-neutral-50 dark:data-[active=false]:bg-neutral-800 dark:data-[active=false]:text-neutral-300 dark:data-[active=false]:hover:bg-neutral-700/50 focus-visible:ring-2 focus-visible:ring-inset focus-visible:ring-accent/35"
                        >
                            Off
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <main class="app mx-auto w-full max-w-3xl px-4 pb-8 pt-4">
            <section aria-labelledby="input-heading">
                <div
                    class="mb-3 text-xs font-medium text-neutral-500 dark:text-neutral-400"
                    id="input-heading"
                >
                    Input
                </div>

                <div class="rounded-2xl border border-border bg-surface p-4">
                    <div>
                        <label
                            for="khmer-input"
                            class="mb-1.5 block text-[13px] font-medium text-neutral-600 dark:text-neutral-300"
                            >Khmer Text</label
                        >
                        <textarea
                            id="khmer-input"
                            rows="5"
                            placeholder="Type or paste Khmer text here..."
                            class="w-full min-h-[7.5rem] resize-y rounded-2xl border border-border bg-surface px-3.5 py-3 font-khmer text-base leading-relaxed text-neutral-900 outline-none transition placeholder:text-neutral-400 focus:border-neutral-400 focus:ring-0 focus-visible:ring-2 focus-visible:ring-accent/25 focus-visible:ring-offset-2 dark:text-neutral-100 dark:placeholder:text-neutral-500 dark:focus:border-neutral-500 dark:focus-visible:ring-offset-zinc-950"
                        >សួស្តីអ្នកទាំងអស់គ្នា</textarea>
                    </div>

                    <details
                        class="group mt-4 overflow-hidden rounded-xl border border-border bg-canvas"
                    >
                        <summary
                            class="flex cursor-pointer list-none items-center gap-2 px-3.5 py-3 text-sm font-medium text-neutral-900 transition-colors hover:bg-neutral-50 dark:text-neutral-100 dark:hover:bg-neutral-800/60 [&::-webkit-details-marker]:hidden"
                        >
                            <span
                                class="inline-flex h-4 w-4 shrink-0 text-neutral-400 transition-transform duration-200 group-open:rotate-90"
                                aria-hidden="true"
                            >
                                <svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    viewBox="0 0 20 20"
                                    fill="currentColor"
                                    class="h-4 w-4"
                                >
                                    <path
                                        fill-rule="evenodd"
                                        d="M7.21 14.77a.75.75 0 01.02-1.06L11.168 10 7.23 6.29a.75.75 0 111.04-1.08l4.5 4.25a.75.75 0 010 1.08l-4.5 4.25a.75.75 0 01-1.06-.02z"
                                        clip-rule="evenodd"
                                    />
                                </svg>
                            </span>
                            Custom dictionary
                            <span class="font-normal text-neutral-400 dark:text-neutral-500"
                                >(optional, one word per line)</span
                            >
                        </summary>
                        <div class="border-t border-border px-3.5 pb-3.5 pt-2">
                            <p class="mb-2 text-xs leading-snug text-neutral-500 dark:text-neutral-400">
                                Words are added on top of the built-in 49K word
                                dictionary.
                            </p>
                            <textarea
                                id="dict-input"
                                rows="4"
                                placeholder="Add custom words here..."
                                class="w-full resize-y rounded-2xl border border-border bg-surface px-3 py-2.5 font-khmer text-sm leading-relaxed text-neutral-900 outline-none transition placeholder:text-neutral-400 focus:border-neutral-400 focus:ring-0 focus-visible:ring-2 focus-visible:ring-accent/25 focus-visible:ring-offset-2 dark:text-neutral-100 dark:placeholder:text-neutral-500 dark:focus:border-neutral-500 dark:focus-visible:ring-offset-zinc-950"
                            ></textarea>
                        </div>
                    </details>
                </div>
            </section>

            <section
                class="mt-8 border-t border-border pt-8"
                id="results-panel"
                aria-label="Segmentation results"
            >
                <div
                    class="mb-3 text-xs font-medium text-neutral-500 dark:text-neutral-400"
                >
                    Results
                </div>

                <div
                    class="tablist mb-3 flex flex-wrap gap-0.5 border-b border-border"
                    role="tablist"
                    aria-label="More result details"
                >
                    <button
                        type="button"
                        class="tab -mb-px rounded-t-lg border-b-2 border-transparent px-3 py-2 text-sm font-medium text-neutral-500 outline-none transition-all duration-150 hover:bg-neutral-50 hover:text-neutral-800 dark:text-neutral-400 dark:hover:bg-neutral-800/80 dark:hover:text-neutral-200 data-[selected=true]:border-accent data-[selected=true]:font-semibold data-[selected=true]:text-neutral-900 dark:data-[selected=true]:text-neutral-100 focus-visible:ring-2 focus-visible:ring-accent/30 focus-visible:ring-offset-2 dark:focus-visible:ring-offset-zinc-950"
                        role="tab"
                        id="tab-summary"
                        data-selected="true"
                        aria-selected="true"
                        aria-controls="tab-panel-summary"
                        tabindex="0"
                    >
                        Summary
                    </button>
                    <button
                        type="button"
                        class="tab -mb-px rounded-t-lg border-b-2 border-transparent px-3 py-2 text-sm font-medium text-neutral-500 outline-none transition-all duration-150 hover:bg-neutral-50 hover:text-neutral-800 dark:text-neutral-400 dark:hover:bg-neutral-800/80 dark:hover:text-neutral-200 data-[selected=true]:border-accent data-[selected=true]:font-semibold data-[selected=true]:text-neutral-900 dark:data-[selected=true]:text-neutral-100 focus-visible:ring-2 focus-visible:ring-accent/30 focus-visible:ring-offset-2 dark:focus-visible:ring-offset-zinc-950"
                        role="tab"
                        id="tab-clusters"
                        data-selected="false"
                        aria-selected="false"
                        aria-controls="tab-panel-clusters"
                        tabindex="-1"
                    >
                        Clusters
                    </button>
                    <button
                        type="button"
                        class="tab -mb-px rounded-t-lg border-b-2 border-transparent px-3 py-2 text-sm font-medium text-neutral-500 outline-none transition-all duration-150 hover:bg-neutral-50 hover:text-neutral-800 dark:text-neutral-400 dark:hover:bg-neutral-800/80 dark:hover:text-neutral-200 data-[selected=true]:border-accent data-[selected=true]:font-semibold data-[selected=true]:text-neutral-900 dark:data-[selected=true]:text-neutral-100 focus-visible:ring-2 focus-visible:ring-accent/30 focus-visible:ring-offset-2 dark:focus-visible:ring-offset-zinc-950"
                        role="tab"
                        id="tab-json"
                        data-selected="false"
                        aria-selected="false"
                        aria-controls="tab-panel-json"
                        tabindex="-1"
                    >
                        JSON
                    </button>
                </div>

                <div class="tab-panels min-h-[120px]" id="tab-panels">
                    <div
                        class="tab-panel pt-1"
                        role="tabpanel"
                        id="tab-panel-summary"
                        aria-labelledby="tab-summary"
                    >
                        <div
                            class="stats-strip mb-3 flex flex-wrap gap-1.5"
                            id="stats-row"
                        ></div>
                        <div
                            class="result-box result-box--plain rounded-2xl border border-border bg-surface px-3.5 py-3 text-sm text-neutral-800 dark:text-neutral-200"
                            id="detect-result"
                        ></div>
                        <div
                            class="normalize-block mt-3 border-t border-border pt-3"
                            id="normalize-section"
                            hidden
                        >
                            <div
                                class="normalize-label mb-2 text-[11px] font-medium uppercase tracking-wide text-neutral-500 dark:text-neutral-400"
                            >
                                Normalization
                            </div>
                            <div id="normalize-result"></div>
                        </div>
                    </div>

                    <div
                        class="tab-panel pt-1"
                        role="tabpanel"
                        id="tab-panel-clusters"
                        aria-labelledby="tab-clusters"
                        hidden
                    >
                        <div
                            class="tab-panel-meta mb-2 min-h-[1.2em] text-xs text-neutral-500 dark:text-neutral-400"
                            id="cluster-count"
                        ></div>
                        <div
                            class="result-box rounded-2xl border border-border bg-surface px-3.5 py-3 font-khmer text-base leading-relaxed text-neutral-900 dark:text-neutral-100"
                            id="cluster-result"
                        ></div>
                    </div>

                    <div
                        class="tab-panel pt-1"
                        role="tabpanel"
                        id="tab-panel-json"
                        aria-labelledby="tab-json"
                        hidden
                    >
                        <div class="json-wrapper relative pt-1">
                            <button
                                type="button"
                                class="copy-btn absolute right-2.5 top-2.5 z-10 rounded-lg border border-border bg-surface px-3 py-1.5 text-xs font-medium text-neutral-700 transition-colors hover:bg-neutral-50 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent/35 focus-visible:ring-offset-2 dark:border-zinc-600 dark:bg-zinc-800 dark:text-zinc-200 dark:hover:bg-zinc-700 dark:focus-visible:ring-offset-zinc-950"
                                id="copy-json"
                            >
                                Copy
                            </button>
                            <div
                                class="json-output max-h-[min(360px,50vh)] overflow-y-auto overflow-x-auto whitespace-pre rounded-2xl border border-border bg-[#f4f4f4] px-3.5 pb-3 pt-9 font-mono text-[11px] leading-relaxed text-neutral-800 dark:border-zinc-700 dark:bg-zinc-900 dark:text-zinc-200"
                                id="json-output"
                            ></div>
                        </div>
                    </div>
                </div>

                <section
                    class="tokens-section mt-4 rounded-2xl border border-border bg-surface p-3.5"
                    aria-label="Word tokens"
                >
                    <div
                        class="mb-2 flex flex-wrap items-baseline justify-between gap-2"
                    >
                        <h2
                            class="text-xs font-medium text-neutral-500 dark:text-neutral-400"
                        >
                            Tokens
                        </h2>
                        <div
                            class="min-h-[1.2em] text-xs text-neutral-500 dark:text-neutral-400"
                            id="token-count"
                        ></div>
                    </div>
                    <div
                        class="min-h-12 rounded-2xl border border-border bg-canvas px-3.5 py-3 font-khmer text-base leading-relaxed text-neutral-900 dark:text-neutral-100"
                        id="segment-result"
                    ></div>
                </section>
            </section>
        </main>

        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
