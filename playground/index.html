<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Khmer Segment Playground</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #000000;
      --white: #ffffff;
      --body-gray: #4b4b4b;
      --muted-gray: #afafaf;
      --chip-gray: #efefef;
      --hover-gray: #e2e2e2;
      --hover-light: #f3f3f3;
      --shadow: rgba(0, 0, 0, 0.12) 0px 4px 16px 0px;
      --shadow-md: rgba(0, 0, 0, 0.16) 0px 2px 8px 0px;
      --shadow-pressed: rgba(0, 0, 0, 0.08);
      --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
      --font-khmer: 'Google Sans', sans-serif;
      --radius-pill: 999px;
      --radius-card: 8px;
    }

    body {
      font-family: var(--font-sans);
      background: var(--white);
      color: var(--black);
      line-height: 1.5;
      min-height: 100vh;
    }

    header {
      background: var(--white);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--black);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      font-family: var(--font-sans);
      font-size: 20px;
      font-weight: 700;
      color: var(--black);
      line-height: 1.4;
    }

    header span {
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 500;
      color: var(--black);
      background: var(--chip-gray);
      padding: 4px 10px;
      border-radius: var(--radius-pill);
    }

    .app {
      display: grid;
      grid-template-columns: 1fr 1fr;
      max-width: 1136px;
      margin: 0 auto;
      min-height: calc(100vh - 49px);
    }

    .panel {
      padding: 24px;
      overflow-y: auto;
    }

    .panel--input {
      border-right: 1px solid rgba(0, 0, 0, 0.08);
    }

    .panel-title {
      font-family: var(--font-sans);
      font-size: 16px;
      font-weight: 700;
      color: var(--black);
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 500;
      color: var(--body-gray);
      margin-bottom: 6px;
    }

    textarea {
      width: 100%;
      background: var(--white);
      border: 1px solid var(--black);
      border-radius: var(--radius-card);
      padding: 12px;
      color: var(--black);
      font-family: var(--font-khmer);
      font-size: 16px;
      line-height: 1.7;
      resize: vertical;
      outline: none;
      transition: box-shadow 0.15s;
    }

    textarea:focus {
      box-shadow: inset 0 0 0 2px rgba(0, 0, 0, 0.12);
    }

    .input-group { margin-bottom: 16px; }

    .controls {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .control-label {
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 500;
      color: var(--body-gray);
    }

    .strategy-btns {
      display: flex;
      gap: 4px;
    }

    .strategy-btns button {
      background: var(--chip-gray);
      border: none;
      color: var(--black);
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 500;
      padding: 6px 14px;
      cursor: pointer;
      border-radius: var(--radius-pill);
      transition: background 0.15s, color 0.15s;
    }

    .strategy-btns button:hover {
      background: var(--hover-gray);
    }

    .strategy-btns button.active {
      background: var(--black);
      color: var(--white);
    }

    .strategy-btns button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .normalize-btns {
      display: flex;
      gap: 0;
    }

    .normalize-btns button {
      background: var(--chip-gray);
      border: none;
      color: var(--black);
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 500;
      padding: 6px 14px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .normalize-btns button:first-child {
      border-radius: var(--radius-pill) 0 0 var(--radius-pill);
    }

    .normalize-btns button:last-child {
      border-radius: 0 var(--radius-pill) var(--radius-pill) 0;
    }

    .normalize-btns button.active {
      background: var(--black);
      color: var(--white);
    }

    .section {
      margin-bottom: 20px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .section-title {
      font-family: var(--font-sans);
      font-size: 16px;
      font-weight: 700;
      color: var(--black);
      line-height: 1.4;
    }

    .section-meta {
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 400;
      color: var(--muted-gray);
    }

    .result-box {
      background: var(--white);
      border-radius: var(--radius-card);
      padding: 12px;
      font-family: var(--font-khmer);
      font-size: 16px;
      line-height: 1.7;
      min-height: 40px;
      box-shadow: var(--shadow);
    }

    .cluster-separator {
      color: var(--black);
      font-weight: 700;
      margin: 0 2px;
      user-select: none;
      opacity: 0.3;
    }

    .token-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      margin: 3px;
      border-radius: var(--radius-pill);
      font-family: var(--font-khmer);
      font-size: 15px;
      line-height: 1.4;
      transition: transform 0.1s;
    }

    .token-pill:hover {
      transform: translateY(-1px);
    }

    .token-pill.known {
      background: var(--black);
      color: var(--white);
    }

    .token-pill.unknown {
      background: var(--chip-gray);
      color: var(--black);
    }

    .token-meta {
      font-family: var(--font-sans);
      font-size: 10px;
      opacity: 0.6;
    }

    .token-status {
      font-family: var(--font-sans);
      font-size: 9px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .json-output {
      background: var(--white);
      border-radius: var(--radius-card);
      padding: 16px;
      font-family: 'SF Mono', 'Fira Code', 'Menlo', monospace;
      font-size: 12px;
      line-height: 1.6;
      color: var(--body-gray);
      overflow-x: auto;
      white-space: pre;
      max-height: 300px;
      overflow-y: auto;
      box-shadow: var(--shadow);
    }

    .copy-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: var(--white);
      border: none;
      color: var(--black);
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: var(--radius-pill);
      cursor: pointer;
      box-shadow: var(--shadow-md);
      transition: background 0.15s;
    }

    .copy-btn:hover {
      background: var(--hover-light);
    }

    .json-wrapper {
      position: relative;
    }

    .stats-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .stat-card {
      background: var(--white);
      border-radius: var(--radius-card);
      padding: 12px 16px;
      min-width: 80px;
      box-shadow: var(--shadow);
    }

    .stat-value {
      font-family: var(--font-sans);
      font-size: 20px;
      font-weight: 700;
      color: var(--black);
      line-height: 1.2;
    }

    .stat-label {
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 400;
      color: var(--muted-gray);
      margin-top: 2px;
    }

    .comparison {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 14px;
      flex-wrap: wrap;
    }

    .comparison .arrow {
      color: var(--muted-gray);
      font-size: 16px;
    }

    .comparison .before,
    .comparison .after {
      padding: 4px 10px;
      border-radius: var(--radius-pill);
      font-family: var(--font-khmer);
      font-size: 14px;
    }

    .comparison .before {
      background: var(--chip-gray);
      color: var(--black);
      text-decoration: line-through;
      text-decoration-color: var(--muted-gray);
    }

    .comparison .after {
      background: var(--black);
      color: var(--white);
    }

    .detect-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      font-family: var(--font-sans);
      font-size: 14px;
      color: var(--body-gray);
    }

    .detect-row strong {
      color: var(--black);
    }

    .empty-state {
      color: var(--muted-gray);
      font-family: var(--font-sans);
      font-size: 14px;
      font-style: italic;
      padding: 12px 0;
    }

    @media (max-width: 768px) {
      .app {
        grid-template-columns: 1fr;
      }
      .panel--input {
        border-right: none;
        border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      }
      header h1 {
        font-size: 18px;
      }
      .controls {
        gap: 12px;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>Khmer Segment</h1>
  <span>Playground</span>
</header>

<div class="app">
  <div class="panel panel--input">
    <div class="panel-title">Input</div>

    <div class="input-group">
      <label for="khmer-input">Khmer Text</label>
      <textarea id="khmer-input" rows="5" placeholder="Type or paste Khmer text here...">សួស្តីអ្នកទាំងអស់គ្នា</textarea>
    </div>

    <div class="controls">
      <div class="control-group">
        <span class="control-label">Strategy</span>
        <div class="strategy-btns">
          <button type="button" class="active" data-strategy="fmm">FMM</button>
          <button type="button" data-strategy="bmm" disabled title="Coming in v0.2">BMM</button>
          <button type="button" data-strategy="bimm" disabled title="Coming in v0.2">BiMM</button>
        </div>
      </div>
      <div class="control-group">
        <span class="control-label">Normalize</span>
        <div class="normalize-btns">
          <button type="button" class="active" data-norm="on">On</button>
          <button type="button" data-norm="off">Off</button>
        </div>
      </div>
    </div>

    <div class="input-group">
      <label for="dict-input">Dictionary (one word per line) <span style="color:var(--muted-gray);font-weight:400;">— added on top of the built-in 34K word dictionary</span></label>
      <textarea id="dict-input" rows="4" style="font-size:14px;" placeholder="Add custom words here (optional)..."></textarea>
    </div>
  </div>

  <div class="panel" id="results-panel">
    <div class="panel-title">Results</div>

    <div class="stats-row" id="stats-row"></div>

    <div class="section" id="detect-section">
      <div class="section-header">
        <div class="section-title">Detection</div>
      </div>
      <div class="result-box" id="detect-result"></div>
    </div>

    <div class="section" id="normalize-section" style="display:none;">
      <div class="section-header">
        <div class="section-title">Normalization</div>
        <span class="section-meta">Changed</span>
      </div>
      <div class="result-box" id="normalize-result"></div>
    </div>

    <div class="section">
      <div class="section-header">
        <div class="section-title">Clusters</div>
        <span class="section-meta" id="cluster-count"></span>
      </div>
      <div class="result-box" id="cluster-result"></div>
    </div>

    <div class="section">
      <div class="section-header">
        <div class="section-title">Segmentation</div>
        <span class="section-meta" id="token-count"></span>
      </div>
      <div class="result-box" id="segment-result"></div>
    </div>

    <div class="section">
      <div class="section-header">
        <div class="section-title">JSON Output</div>
      </div>
      <div class="json-wrapper">
        <button type="button" class="copy-btn" id="copy-json">Copy</button>
        <div class="json-output" id="json-output"></div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import {
    containsKhmer,
    isKhmerText,
    isKhmerChar,
    normalizeKhmer,
    splitClusters,
    countClusters,
    getClusterBoundaries,
    segmentWords,
    createDictionary,
  } from "../dist/index.js";
  import {
    getDefaultDictionary,
    loadFrequencyDictionary,
  } from "../dist/dictionary/index.js";

  const inputEl = document.getElementById("khmer-input");
  const dictEl = document.getElementById("dict-input");
  const strategyBtns = document.querySelectorAll(".strategy-btns button:not([disabled])");
  const normalizeBtns = document.querySelectorAll(".normalize-btns button");
  const copyBtn = document.getElementById("copy-json");

  let normalize = true;
  let strategy = "fmm";

  for (const btn of normalizeBtns) {
    btn.addEventListener("click", () => {
      normalize = btn.dataset.norm === "on";
      for (const b of normalizeBtns) b.classList.remove("active");
      btn.classList.add("active");
      update();
    });
  }

  for (const btn of strategyBtns) {
    btn.addEventListener("click", () => {
      for (const b of strategyBtns) b.classList.remove("active");
      btn.classList.add("active");
      strategy = btn.dataset.strategy;
      update();
    });
  }

  copyBtn.addEventListener("click", () => {
    const jsonText = document.getElementById("json-output").textContent;
    navigator.clipboard.writeText(jsonText).then(() => {
      copyBtn.textContent = "Copied!";
      setTimeout(() => { copyBtn.textContent = "Copy"; }, 1500);
    });
  });

  inputEl.addEventListener("input", update);
  dictEl.addEventListener("input", update);

  function escapeHtml(str) {
    return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  function update() {
    const text = inputEl.value;
    if (!text.trim()) {
      renderEmpty();
      return;
    }

    const builtInDict = getDefaultDictionary();

    const customWords = dictEl.value
      .split("\n")
      .map((w) => w.trim())
      .filter(Boolean);

    const freqData = loadFrequencyDictionary();
    const allWords = [...freqData.words, ...customWords];
    const dict = createDictionary(allWords, freqData.frequencies);

    const hasKhmer = containsKhmer(text);
    const isKhmer = isKhmerText(text);
    const normalized = normalizeKhmer(text);
    const clusters = splitClusters(normalize ? normalized : text);
    const clusterCount = countClusters(normalize ? normalized : text);
    const result = segmentWords(text, {
      dictionary: dict,
      normalize,
      strategy,
    });

    renderStats(hasKhmer, isKhmer, clusterCount, result.tokens.length, builtInDict.size, customWords.length);
    renderDetection(hasKhmer, isKhmer);
    renderNormalization(text, normalized);
    renderClusters(clusters);
    renderSegmentation(result.tokens);
    renderJson(result);
  }

  function renderEmpty() {
    document.getElementById("stats-row").innerHTML = "";
    document.getElementById("detect-result").innerHTML = '<div class="empty-state">Type some text to see results...</div>';
    document.getElementById("normalize-section").style.display = "none";
    document.getElementById("cluster-result").innerHTML = "";
    document.getElementById("segment-result").innerHTML = "";
    document.getElementById("json-output").textContent = "";
    document.getElementById("cluster-count").textContent = "";
    document.getElementById("token-count").textContent = "";
  }

  function renderStats(hasKhmer, isKhmer, clusterCount, tokenCount, dictSize, customWordCount) {
    document.getElementById("stats-row").innerHTML = `
      <div class="stat-card">
        <div class="stat-value">${hasKhmer ? "Yes" : "No"}</div>
        <div class="stat-label">Contains Khmer</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${isKhmer ? "Yes" : "No"}</div>
        <div class="stat-label">Pure Khmer</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${clusterCount}</div>
        <div class="stat-label">Clusters</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${tokenCount}</div>
        <div class="stat-label">Tokens</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${dictSize.toLocaleString()}</div>
        <div class="stat-label">Dict Words</div>
      </div>
      ${customWordCount > 0 ? `
      <div class="stat-card">
        <div class="stat-value">+${customWordCount}</div>
        <div class="stat-label">Custom Words</div>
      </div>` : ""}
    `;
  }

  function renderDetection(hasKhmer, isKhmer) {
    document.getElementById("detect-result").innerHTML = `
      <div class="detect-row">
        <span>containsKhmer: <strong>${hasKhmer}</strong></span>
        <span>isKhmerText: <strong>${isKhmer}</strong></span>
      </div>
    `;
  }

  function renderNormalization(original, normalized) {
    const section = document.getElementById("normalize-section");
    if (original !== normalized && normalize) {
      section.style.display = "";
      document.getElementById("normalize-result").innerHTML = `
        <div class="comparison">
          <span class="before">${escapeHtml(original)}</span>
          <span class="arrow">&rarr;</span>
          <span class="after">${escapeHtml(normalized)}</span>
        </div>
      `;
    } else {
      section.style.display = "none";
    }
  }

  function renderClusters(clusters) {
    document.getElementById("cluster-count").textContent = `${clusters.length} clusters`;
    const html = clusters
      .map((c) => `<span>${escapeHtml(c)}</span>`)
      .join('<span class="cluster-separator">|</span>');
    document.getElementById("cluster-result").innerHTML = html;
  }

  function renderSegmentation(tokens) {
    const known = tokens.filter((t) => t.isKnown).length;
    const unknown = tokens.length - known;
    document.getElementById("token-count").textContent = `${tokens.length} tokens (${known} known, ${unknown} unknown)`;

    const html = tokens
      .map((t) => {
        const cls = t.isKnown ? "known" : "unknown";
        return `<span class="token-pill ${cls}">
          ${escapeHtml(t.value)}
          <span class="token-status">${t.isKnown ? "known" : "unknown"}</span>
          <span class="token-meta">${t.start}:${t.end}</span>
        </span>`;
      })
      .join("");
    document.getElementById("segment-result").innerHTML = html;
  }

  function renderJson(result) {
    const json = JSON.stringify(result, null, 2);
    document.getElementById("json-output").textContent = json;
  }

  update();
</script>

</body>
</html>
