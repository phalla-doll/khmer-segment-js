name: CI

on:
    push:
        branches:
            - main
    pull_request:

jobs:
    checks:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                node-version: [18, 20]

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build

            - name: Run tests
              run: npm test

            - name: Run lint
              run: npm run lint

            - name: Check formatting
              run: npm run format:check

            - name: Run performance tests
              run: npm run test:perf

            - name: Download benchmark corpus
              run: npm run download:benchmark

            - name: Run accuracy benchmark regression check
              run: npm run test:accuracy:check
